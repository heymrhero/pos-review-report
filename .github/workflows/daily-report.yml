name: 每日英雄评价日报

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - run: npx playwright install chromium --with-deps

      - name: 运行评价日报脚本
        env:
          POS_USERNAME: ${{ secrets.POS_USERNAME }}
          POS_PASSWORD: ${{ secrets.POS_PASSWORD }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          COS_BASE_URL: ${{ secrets.COS_BASE_URL }}
        run: node pos_review_report.js

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: review-report
          path: review_report_*.html
          retention-days: 30
